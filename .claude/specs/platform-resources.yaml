          - action: implement
            description: "创建 platformResources DVA model"
            file: src/models/platformResources.js
            code: |
              import {
                listStorageClasses,
                createStorageClass,
                deleteStorageClass,
                listPersistentVolumes,
                listPlatformResources,
                deletePlatformResource,
              } from '../services/platformResource';

              export default {
                namespace: 'platformResources',
                state: {
                  storageClasses: [],
                  persistentVolumes: [],
                  platformResources: [],
                  total: 0,
                },
                effects: {
                  *fetchStorageClasses({ payload }, { call, put }) {
                    const res = yield call(listStorageClasses, payload);
                    if (res && res.bean) {
                      yield put({ type: 'save', payload: { storageClasses: res.bean.list || [] } });
                    }
                  },
                  *createStorageClass({ payload, callback }, { call }) {
                    const res = yield call(createStorageClass, payload);
                    if (res && callback) callback(res);
                  },
                  *deleteStorageClass({ payload, callback }, { call }) {
                    const res = yield call(deleteStorageClass, payload);
                    if (res && callback) callback(res);
                  },
                  *fetchPersistentVolumes({ payload }, { call, put }) {
                    const res = yield call(listPersistentVolumes, payload);
                    if (res && res.bean) {
                      yield put({ type: 'save', payload: { persistentVolumes: res.bean.list || [] } });
                    }
                  },
                  *fetchPlatformResources({ payload }, { call, put }) {
                    const res = yield call(listPlatformResources, payload);
                    if (res && res.bean) {
                      yield put({ type: 'save', payload: { platformResources: res.bean.list || [], total: res.bean.total || 0 } });
                    }
                  },
                  *deletePlatformResource({ payload, callback }, { call }) {
                    const res = yield call(deletePlatformResource, payload);
                    if (res && callback) callback(res);
                  },
                },
                reducers: {
                  save(state, { payload }) {
                    return { ...state, ...payload };
                  },
                },
              };

          - action: implement
            description: "创建 PlatformResources 页面组件（5 Tab）"
            file: src/pages/PlatformResources/index.js
            code: |
              import React, { PureComponent } from 'react';
              import { connect } from 'dva';
              import { Tabs, Table, Button, Modal, Input, Tag, Popconfirm } from 'antd';
              import { formatMessage } from '@/utils/intl';

              const { TabPane } = Tabs;
              const { TextArea } = Input;

              @connect(({ platformResources, user }) => ({
                storageClasses: platformResources.storageClasses,
                persistentVolumes: platformResources.persistentVolumes,
                currentUser: user.currentUser,
              }))
              class PlatformResources extends PureComponent {
                state = {
                  activeTab: 'storage',
                  storageSubTab: 'storageclass',
                  createModalVisible: false,
                  yamlContent: '',
                  createTarget: '',
                };

                componentDidMount() {
                  this.fetchStorageClasses();
                }

                fetchStorageClasses = () => {
                  const { dispatch, match } = this.props;
                  const { eid, regionName } = match.params;
                  dispatch({
                    type: 'platformResources/fetchStorageClasses',
                    payload: { eid, region: regionName },
                  });
                };

                handleDeleteStorageClass = (name) => {
                  const { dispatch, match } = this.props;
                  const { eid, regionName } = match.params;
                  dispatch({
                    type: 'platformResources/deleteStorageClass',
                    payload: { eid, region: regionName, name },
                    callback: () => this.fetchStorageClasses(),
                  });
                };

                handleCreateConfirm = () => {
                  const { dispatch, match } = this.props;
                  const { eid, regionName } = match.params;
                  const { yamlContent, createTarget } = this.state;
                  dispatch({
                    type: `platformResources/create${createTarget}`,
                    payload: { eid, region: regionName, yaml: yamlContent },
                    callback: () => {
                      this.setState({ createModalVisible: false, yamlContent: '' });
                      this.fetchStorageClasses();
                    },
                  });
                };

                renderStorageClassTab() {
                  const { storageClasses } = this.props;
                  const columns = [
                    { title: '名称', dataIndex: 'name', key: 'name' },
