              # -*- coding: utf-8 -*-
              from rest_framework.response import Response

              from console.views.base import EnterpriseAdminView
              from goodrain_web.tools import general_message
              from www.apiclient.regionapi import RegionInvokeApi

              region_api = RegionInvokeApi()


              def _proxy_get(region_name, path, params=None):
                  """代理 GET 请求到 Go /v2/cluster/ 接口"""
                  return region_api.get_cluster_resource(region_name, path, params=params)


              def _proxy_post(region_name, path, body):
                  """代理 POST 请求到 Go /v2/cluster/ 接口"""
                  return region_api.post_cluster_resource(region_name, path, body=body)


              def _proxy_delete(region_name, path, params=None):
                  """代理 DELETE 请求到 Go /v2/cluster/ 接口"""
                  return region_api.delete_cluster_resource(region_name, path, params=params)


              class PlatformResourceTypesView(EnterpriseAdminView):
                  def get(self, request, eid, region, *args, **kwargs):
                      data = _proxy_get(region, "platform-resources/types")
                      return Response(general_message(200, "success", "OK", bean=data))


              class PlatformResourcesView(EnterpriseAdminView):
                  def get(self, request, eid, region, *args, **kwargs):
                      params = {k: v for k, v in request.GET.items()}
                      data = _proxy_get(region, "platform-resources", params=params)
                      return Response(general_message(200, "success", "OK", bean=data))

                  def post(self, request, eid, region, *args, **kwargs):
                      params = {k: v for k, v in request.GET.items()}
                      data = _proxy_post(region, "platform-resources?" + _encode_params(params), request.body)
                      return Response(general_message(200, "success", "OK", bean=data))


              class PlatformResourceDetailView(EnterpriseAdminView):
                  def get(self, request, eid, region, name, *args, **kwargs):
                      params = {k: v for k, v in request.GET.items()}
                      data = _proxy_get(region, "platform-resources/{}".format(name), params=params)
                      return Response(general_message(200, "success", "OK", bean=data))

                  def delete(self, request, eid, region, name, *args, **kwargs):
                      params = {k: v for k, v in request.GET.items()}
                      _proxy_delete(region, "platform-resources/{}".format(name), params=params)
                      return Response(general_message(200, "success", "删除成功"))


              class StorageClassesView(EnterpriseAdminView):
                  def get(self, request, eid, region, *args, **kwargs):
                      data = _proxy_get(region, "storageclasses")
                      return Response(general_message(200, "success", "OK", bean=data))

                  def post(self, request, eid, region, *args, **kwargs):
                      data = _proxy_post(region, "storageclasses", request.body)
                      return Response(general_message(200, "success", "OK", bean=data))


              class StorageClassDetailView(EnterpriseAdminView):
                  def delete(self, request, eid, region, name, *args, **kwargs):
                      _proxy_delete(region, "storageclasses/{}".format(name))
                      return Response(general_message(200, "success", "删除成功"))


              class PersistentVolumesView(EnterpriseAdminView):
                  def get(self, request, eid, region, *args, **kwargs):
                      data = _proxy_get(region, "persistentvolumes")
                      return Response(general_message(200, "success", "OK", bean=data))

                  def post(self, request, eid, region, *args, **kwargs):
                      data = _proxy_post(region, "persistentvolumes", request.body)
                      return Response(general_message(200, "success", "OK", bean=data))


              class PersistentVolumeDetailView(EnterpriseAdminView):
                  def delete(self, request, eid, region, name, *args, **kwargs):
                      _proxy_delete(region, "persistentvolumes/{}".format(name))
                      return Response(general_message(200, "success", "删除成功"))


              def _encode_params(params):
                  return "&".join("{}={}".format(k, v) for k, v in params.items())

