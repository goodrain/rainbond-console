            code: |
              import apiconfig from '../../config/api.config';
              import request from '../utils/request';

              const base = (team, region) =>
                `${apiconfig.baseUrl}/console/teams/${team}/regions/${region}`;

              export async function listNsResources(body = {}) {
                return request(`${base(body.team, body.region)}/ns-resources`, {
                  method: 'get',
                  params: { group: body.group, version: body.version, resource: body.resource }
                });
              }

              export async function createNsResource(body = {}) {
                return request(`${base(body.team, body.region)}/ns-resources?source=${body.source || 'manual'}`, {
                  method: 'post',
                  data: body.yaml,
                  params: { group: body.group, version: body.version, resource: body.resource },
                  headers: { 'Content-Type': 'application/yaml' }
                });
              }

              export async function deleteNsResource(body = {}) {
                return request(
                  `${base(body.team, body.region)}/ns-resources/${body.name}`,
                  {
                    method: 'delete',
                    params: { group: body.group, version: body.version, resource: body.resource }
                  }
                );
              }

              export async function listHelmReleases(body = {}) {
                return request(`${base(body.team, body.region)}/helm/releases`, { method: 'get' });
              }

              export async function installHelmRelease(body = {}) {
                return request(`${base(body.team, body.region)}/helm/releases`, {
                  method: 'post',
                  data: {
                    repo_name: body.repo_name,
                    chart: body.chart,
                    version: body.version,
                    release_name: body.release_name,
                    values: body.values,
                  }
                });
              }

              export async function uninstallHelmRelease(body = {}) {
                return request(`${base(body.team, body.region)}/helm/releases/${body.release_name}`, { method: 'delete' });
              }

          - action: implement
            description: "创建 teamResources DVA model"
            file: src/models/teamResources.js
            code: |
              import {
                listNsResources,
                createNsResource,
                deleteNsResource,
                listHelmReleases,
                installHelmRelease,
                uninstallHelmRelease,
              } from '../services/teamResource';

              export default {
                namespace: 'teamResources',
                state: {
                  resources: [],
                  helmReleases: [],
                  total: 0,
                },
                effects: {
                  *fetchResources({ payload }, { call, put }) {
                    const res = yield call(listNsResources, payload);
                    if (res && res.bean) {
                      yield put({ type: 'save', payload: { resources: res.bean.list || [], total: res.bean.total || 0 } });
                    }
                  },
                  *createResource({ payload, callback }, { call }) {
                    const res = yield call(createNsResource, payload);
                    if (callback) callback(res);
                  },
                  *deleteResource({ payload, callback }, { call }) {
                    const res = yield call(deleteNsResource, payload);
                    if (callback) callback(res);
                  },
                  *fetchHelmReleases({ payload }, { call, put }) {
                    const res = yield call(listHelmReleases, payload);
                    if (res && res.bean) {
                      yield put({ type: 'save', payload: { helmReleases: res.bean.list || [] } });
                    }
                  },
                  *installRelease({ payload, callback }, { call }) {
                    const res = yield call(installHelmRelease, payload);
                    if (callback) callback(res);
                  },
                  *uninstallRelease({ payload, callback }, { call }) {
                    const res = yield call(uninstallHelmRelease, payload);
                    if (callback) callback(res);
                  },
                },
                reducers: {
                  save(state, { payload }) {
                    return { ...state, ...payload };
                  },
                },
              };

