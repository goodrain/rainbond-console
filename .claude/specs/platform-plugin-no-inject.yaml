        message: "feat: support no-inject platform plugin publish option"
        tasks: [task-1.1, task-1.2]
    tasks:
      - id: task-1.1
        name: "增加不注入选项与互斥选择逻辑"
        status: pending
        files:
          modify:
            - path: src/pages/Group/components/AppPublishSetting.js
              lines: "400-910"
        acceptance:
          - cmd: "cd /Users/zhangqihang/MyWork/workrc/rainbond-ui && yarn build"
            expect: "exit 0"
      - id: task-1.2
        name: "更新完成态校验与国际化文案"
        status: pending
        files:
          modify:
            - path: src/pages/Group/components/AppShareBase.js
              lines: "460-490"
            - path: src/locales/zh-CN/app.js
              lines: "160-175"
            - path: src/locales/en-US/app.js
              lines: "160-175"
        acceptance:
          - cmd: "cd /Users/zhangqihang/MyWork/workrc/rainbond-ui && yarn build"
            expect: "exit 0"

