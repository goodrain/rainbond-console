meta:
  name: "平台插件发布支持不注入"
  version: "1.0"
  repos:
    - rainbond-console: /Users/zhangqihang/MyWork/workrc/rainbond-console
    - rainbond-ui: /Users/zhangqihang/MyWork/workrc/rainbond-ui
  design_doc: /Users/zhangqihang/MyWork/workrc/rainbond-console/docs/plans/2026-05-08-platform-plugin-no-inject-design.md
  created_at: "2026-05-08"

constraints:
  - "NoInject 仅用于 rainbond-ui 表单交互，禁止持久化到模板和 region API"
  - "最终模板语义固定为 inject_position: []"
  - "平台插件列表展示逻辑不能因为 plugin_views 为空而被误伤"
  - "React 使用 class component + Ant Design 3.x，yarn build 为质量门控"

