        name: "Add ordered idempotent RainSkills deployment store"
        status: pending
        files:
          create:
            - path: rainskills_deployment.go
            - path: rainskills_deployment_test.go
        steps:
          - action: write-test
            description: "Create SQLite tests for insert, same-attempt final update, duplicate final, and late dispatch."
            code: |
              func TestSaveRainSkillsDeploymentDoesNotDowngradeFinal(t *testing.T) {
                  setupRainSkillsDeploymentTestDB(t)
                  dispatch := validRainSkillsRequest()
                  require.NoError(t, SaveRainSkillsDeployment(dispatch))
                  final := dispatch
                  final.ReportPhase, final.Status = "final", "failure"
                  require.NoError(t, SaveRainSkillsDeployment(final))
                  require.NoError(t, SaveRainSkillsDeployment(dispatch))
                  var got RainSkillsDeployment
                  require.NoError(t, db.Where("deploy_attempt_id = ?", dispatch.DeployAttemptID).First(&got).Error)
                  assert.Equal(t, "final", got.ReportPhase)
                  assert.Equal(t, "failure", got.Status)
                  assert.Equal(t, uint8(2), got.PhaseSequence)
              }
            run: "go test ./... -run 'TestSaveRainSkillsDeployment' -v"
            expect: "FAIL before implementation"
          - action: implement
            description: "Add model, strict request type, normalization, and transaction-safe phase ordering."
            code: |
              type RainSkillsDeployment struct {
                  ID uint `gorm:"primary_key"`
                  DeployAttemptID string `gorm:"type:varchar(64);unique_index;not null"`
                  EID string `gorm:"type:varchar(64);index;not null"`
                  DeployClient string `gorm:"type:varchar(32);not null"`
                  ToolName string `gorm:"type:varchar(96);not null"`
                  DeployType string `gorm:"type:varchar(32);not null"`
                  DeployStage string `gorm:"type:varchar(32);not null"`
                  Trigger string `gorm:"type:varchar(64);not null"`
                  SourceLanguage string `gorm:"type:varchar(64)"`
                  ResourceCreated bool
                  AppID int
                  ServiceIDsJSON string `gorm:"type:text"`
                  EventIDsJSON string `gorm:"type:text"`
                  ServiceCount int
                  EventCount int
                  ServiceIDsTruncated bool
                  EventIDsTruncated bool
                  ReportPhase string `gorm:"type:varchar(16);not null"`
                  PhaseSequence uint8 `gorm:"not null"`
                  Status string `gorm:"type:varchar(16);not null"`
                  DeployResultAt time.Time `gorm:"index"`
                  FailureStage string `gorm:"type:varchar(32)"`
                  FailureCategory string `gorm:"type:varchar(64)"`
                  FailureReason string `gorm:"type:varchar(1024)"`
                  CreatedAt time.Time
                  UpdatedAt time.Time
              }

              func (RainSkillsDeployment) TableName() string { return "rainskills_deployment" }

              // In a transaction: update only where phase_sequence <= incoming;
              // if no row exists create, and retry update after duplicate-key races.
            run: "go test ./... -run 'TestSaveRainSkillsDeployment' -v"
            expect: "PASS"
        acceptance:
          - cmd: "cd /Users/goodrain/Desktop/code/rainbond-request-server && go test ./... -run 'TestSaveRainSkillsDeployment' -v"
            expect: "exit 0"
        references:
          - path: first_deploy.go:289-324
            note: "Existing diagnostic upsert style; do not call or edit it."

      - id: task-1.2
        name: "Add bounded validated telemetry endpoint"
        status: pending
        files:
          modify:
            - path: rainskills_deployment.go
            - path: rainskills_deployment_test.go
            - path: router.go
              lines: "20-35"
        steps:
          - action: write-test
            description: "Test 64 KiB limit, required fields, enum/status combinations, server phase derivation, ID bounds, and 429 limits."
            code: |
              func TestAddRainSkillsDeploymentRejectsInvalidPhaseStatus(t *testing.T) {
                  body := validRainSkillsRequest()
                  body.ReportPhase, body.Status = "dispatch", "success"
                  response := performRainSkillsRequest(t, body)
                  assert.Equal(t, http.StatusBadRequest, response.Code)
              }

              func TestAddRainSkillsDeploymentAcceptsTruncatedLargeBatch(t *testing.T) {
                  body := validRainSkillsRequest()
                  body.ServiceIDs = fiftyStableIDs()
                  body.ServiceCount, body.ServiceIDsTruncated = 75, true
                  response := performRainSkillsRequest(t, body)
                  assert.Equal(t, http.StatusOK, response.Code)
              }
            run: "go test ./... -run 'TestAddRainSkillsDeployment' -v"
            expect: "FAIL before implementation"
          - action: implement
            description: "Decode through io.LimitReader/MaxBytesReader, validate typed DTO, derive sequence, apply configurable fixed-window global/EID limits, and route independently."
            code: |
              func AddRainSkillsDeployment(w http.ResponseWriter, r *http.Request) {
                  if r.Method != http.MethodPost { http.Error(w, "method not allowed", 405); return }
                  r.Body = http.MaxBytesReader(w, r.Body, 64<<10)
                  var req RainSkillsDeploymentRequest
                  decoder := json.NewDecoder(r.Body)
                  if err := decoder.Decode(&req); err != nil { http.Error(w, "invalid request", 400); return }
                  if err := req.Validate(); err != nil { http.Error(w, err.Error(), 400); return }
                  req.PhaseSequence = phaseSequence(req.ReportPhase)
                  if !rainSkillsLimiter.Allow(req.EID) { http.Error(w, "rate limit exceeded", 429); return }
                  if err := SaveRainSkillsDeployment(req); err != nil { http.Error(w, "save failed", 500); return }
                  writeJSON(w, http.StatusOK, map[string]interface{}{"ok": true})
              }
            run: "go test ./... -run 'TestAddRainSkillsDeployment' -v"
            expect: "PASS"
        acceptance:
          - cmd: "cd /Users/goodrain/Desktop/code/rainbond-request-server && go test ./... -run 'TestAddRainSkillsDeployment' -v"
            expect: "exit 0"

