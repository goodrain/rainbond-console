constraints:
  - "Do not modify AddEnterpriseFirstDeploy, EnterpriseFirstDeploy, EnterpriseDeployDiagnostic, or deploy_statistics.go."
  - "RainSkills tracking uses only RAINSKILLS_DEPLOY_* ConsoleSysConfig keys and /api/rainskills/deployments."
  - "Telemetry failures must never change the MCP tool response or replay a Rainbond deployment."
  - "The public telemetry endpoint is low-trust analytics input and must not drive billing, authorization, or product state."
  - "Persist only typed fields; never persist MCP arguments, credentials, full context, or deployment logs."
  - "Request-server derives phase_sequence from report_phase; final may never be downgraded by dispatch."
  - "Console deterministically sorts/deduplicates IDs, sends at most 50, and records original counts/truncation."

