name: pr-ci-build

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    container: python:3.6-buster
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          echo "deb http://archive.debian.org/debian/ buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          apt-get -o Acquire::Check-Valid-Until=false update
          apt-get install -y --no-install-recommends gcc make default-libmysqlclient-dev sqlite3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade 'pip<22'
          pip install -r requirements.txt

      - name: Run tests
        run: python scripts/run_pytest.py . -- -q

      - name: Check test manifest
        run: make test-manifest-check

  rainbond-allinone:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            rainbond/rainbond:dev-allinone
