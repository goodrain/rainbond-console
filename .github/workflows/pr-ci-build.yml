name: pr-ci-build

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    container: python:3.11-bookworm
    env:
      PIP_SRC: /tmp/pip-src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache pip's wheel/download cache so repeat runs (e.g. pushes to the same
      # PR) skip re-downloading the whole requirements set. Keyed on the
      # requirements files so it auto-invalidates when deps change.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: /root/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt', 'requirements-typing.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-

      - name: Install native dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends gcc git make default-libmysqlclient-dev sqlite3 curl

      - name: Install Python dependencies
        run: |
          mkdir -p "$PIP_SRC"
          python -m pip install --upgrade pip 'setuptools<70'
          pip install -r requirements.txt

      - name: Install openapi-client
        run: bash scripts/install_openapi_client.sh

      - name: Run tests
        run: python scripts/run_pytest.py . -- -q

      - name: Check test manifest
        run: make test-manifest-check

  typecheck:
    runs-on: ubuntu-latest
    container: python:3.11-bookworm
    env:
      PIP_SRC: /tmp/pip-src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: /root/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt', 'requirements-typing.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-

      # Persist mypy's incremental cache between runs so it only re-analyzes
      # changed modules instead of all 677 source files. Keyed by config + mypy
      # version (requirements-typing.txt) so it invalidates on a mypy/stub bump;
      # the per-SHA suffix forces a fresh save each run while restore-keys pulls
      # the most recent prior cache for incremental reuse.
      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py311-${{ hashFiles('mypy.ini', 'requirements-typing.txt') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-py311-${{ hashFiles('mypy.ini', 'requirements-typing.txt') }}-

      - name: Install native dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends gcc git make default-libmysqlclient-dev sqlite3 curl

      - name: Install Python dependencies
        run: |
          mkdir -p "$PIP_SRC"
          python -m pip install --upgrade pip 'setuptools<70'
          pip install -r requirements.txt

      - name: Install openapi-client
        run: bash scripts/install_openapi_client.sh

      - name: Install typing dependencies
        run: pip install -r requirements-typing.txt

      - name: Run mypy strict gate (whitelisted modules must stay error-free)
        run: make typecheck-gate

  rainbond-allinone:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            rainbond/rainbond:dev-allinone
