name: commit-ci-build

on:
  push:
    branches: [main, V5.*, fixbug*, Develop*]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    container: python:3.11-bookworm
    env:
      PIP_SRC: /tmp/pip-src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends gcc git make default-libmysqlclient-dev sqlite3 curl

      - name: Install Python dependencies
        run: |
          mkdir -p "$PIP_SRC"
          python -m pip install --upgrade pip 'setuptools<70'
          pip install -r requirements.txt

      - name: Install openapi-client
        run: bash scripts/install_openapi_client.sh

      - name: Run tests
        run: python scripts/run_pytest.py . -- -q

      - name: Check test manifest
        run: make test-manifest-check

  rainbond-allinone:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            rainbond/rainbond:dev-allinone
